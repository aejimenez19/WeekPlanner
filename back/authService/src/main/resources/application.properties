spring.application.name=authService

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/planning_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:aejimenez}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:EstaEsUnaClaveSecretaParaJWT}
jwt.expiration=${JWT_EXPIRATION:86400000}