server:
  port: 8080

spring:
  application:
    name: gatewayservice
  cloud:
    gateway:
      webflux:
        routes:
          - id: auth-service
            uri: http://auth-service:8080
            predicates:
              - Path=/api/auth/**
          - id: task-service
            uri: http://task-service:8080
            predicates:
              - Path=/api/tasks/**
        default-filters:
          - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

  security:
    user:
      name: admin
      password: admin

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTThatIsAtLeast256BitsLong123456}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG